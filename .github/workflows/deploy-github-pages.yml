# Build static site and deploy to GitHub Pages.
# IMPORTANT: In repo Settings → Pages, set Source to "GitHub Actions".
# If Source is "Deploy from a branch", GitHub runs Jekyll on the repo and will fail on *.astro files.
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Omit pnpm version here: action reads `packageManager` from root package.json (single source of truth).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Optional: custom domain and/or URL path when they differ from github.io defaults.
          # Repo Settings → Secrets and variables → Actions → Variables
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
          PUBLIC_BASE_PATH: ${{ vars.PUBLIC_BASE_PATH }}

      - name: Verify dist output
        shell: bash
        run: |
          set -euo pipefail
          test -f apps/web/dist/index.html
          test -f apps/web/dist/skylardryden.jpg
          test -d apps/web/dist/_astro
          n=$(find apps/web/dist/_astro -type f | wc -l)
          if [ "$n" -lt 2 ]; then echo "Missing files in dist/_astro"; ls -laR apps/web/dist; exit 1; fi
          grep -q '_astro/' apps/web/dist/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
