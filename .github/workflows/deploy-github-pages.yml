# Build static site and deploy to GitHub Pages.
# IMPORTANT: In repo Settings → Pages, set Source to "GitHub Actions".
# If Source is "Deploy from a branch", GitHub runs Jekyll on the repo and will fail on *.astro files.
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Omit pnpm version here: action reads `packageManager` from root package.json (single source of truth).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Verify dist output
        shell: bash
        run: |
          set -euo pipefail
          test -f apps/web/dist/index.html
          test -f apps/web/dist/skylardryden.jpg
          test -f apps/web/dist/favicon.svg
          test -f apps/web/dist/.nojekyll
          grep -q 'src="skylardryden.jpg"' apps/web/dist/index.html
          grep -q 'href="favicon.svg?v=1"' apps/web/dist/index.html
          if grep -q '_astro/' apps/web/dist/index.html; then
            echo "Unexpected _astro asset references in index.html"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
