# Build static site and deploy to GitHub Pages.
# IMPORTANT: In repo Settings → Pages, set Source to "GitHub Actions".
# If Source is "Deploy from a branch", GitHub runs Jekyll on the repo and will fail on *.astro files.
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Omit pnpm version here: action reads `packageManager` from root package.json (single source of truth).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Optional: custom domain and/or URL path when they differ from github.io defaults.
          # Repo Settings → Secrets and variables → Actions → Variables
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
          PUBLIC_BASE_PATH: ${{ vars.PUBLIC_BASE_PATH }}

      - name: Verify dist output and HTML asset paths
        shell: bash
        env:
          PUBLIC_BASE_PATH: ${{ vars.PUBLIC_BASE_PATH }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          HTML="apps/web/dist/index.html"
          test -f "$HTML"
          test -d apps/web/dist/astro
          n=$(find apps/web/dist/astro -type f | wc -l)
          echo "dist/astro file count: $n"
          if [ "$n" -lt 4 ]; then echo "Missing built assets under dist/astro"; ls -laR apps/web/dist; exit 1; fi

          REPO="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          RLOW=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          OLOW=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')

          if [ -n "${PUBLIC_BASE_PATH:-}" ] && [ "${PUBLIC_BASE_PATH}" != "/" ]; then
            pb=$(echo "$PUBLIC_BASE_PATH" | tr '[:upper:]' '[:lower:]')
            pb=${pb#/}
            pb=${pb%/}
            PREFIX="/$pb"
          elif [ "$RLOW" = "$OLOW.github.io" ]; then
            PREFIX=""
          else
            PREFIX="/$RLOW"
          fi

          if [ -z "$PREFIX" ] || [ "$PREFIX" = "/" ]; then
            grep -Fq 'url(/astro/' "$HTML" || { echo "Expected url(/astro/...) in HTML"; exit 1; }
          else
            grep -Fq "url(${PREFIX}/astro/" "$HTML" || { echo "Expected url(${PREFIX}/astro/...) in HTML"; head -c 3000 "$HTML"; exit 1; }
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
