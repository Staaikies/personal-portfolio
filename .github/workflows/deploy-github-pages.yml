# Build static site and deploy to GitHub Pages.
# IMPORTANT: In repo Settings → Pages, set Source to "GitHub Actions".
# If Source is "Deploy from a branch", GitHub runs Jekyll on the repo and will fail on *.astro files.
name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Omit pnpm version here: action reads `packageManager` from root package.json (single source of truth).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Verify Pages base in HTML
        shell: bash
        run: |
          set -euo pipefail
          REPO="${GITHUB_REPOSITORY#*/}"
          OWNER="${GITHUB_REPOSITORY%%/*}"
          RLOW=$(echo "$REPO" | tr '[:upper:]' '[:lower:]')
          OLOW=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          HTML="apps/web/dist/index.html"
          # Styles are inlined; font files still load from /REPO/astro/... (build.assets + base).
          if [ "$RLOW" = "$OLOW.github.io" ]; then
            grep -Fq 'url(/astro/' "$HTML" || { echo "Expected root-relative /astro/ asset URLs in HTML"; exit 1; }
          else
            grep -Fq "url(/${REPO}/astro/" "$HTML" || { echo "Expected /${REPO}/astro/ asset URLs in HTML"; head -c 2500 "$HTML"; exit 1; }
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
