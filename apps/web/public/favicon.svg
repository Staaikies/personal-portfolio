<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Orange diamond">
	<title>Orange diamond</title>
	<!-- Matches LARGE ORANGE DIAMOND (🔶) feel: warm fill + slightly deeper edge -->
